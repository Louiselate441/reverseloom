<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>reverseloom</title>
<link rel="icon" type="image/png" href="/static/app-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=JetBrains+Mono:wght@400;500;600;700&family=VT323&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css" />
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  /* ── tokens: amber-on-graphite "reverse terminal" aesthetic ── */
  :root {
    --accent: #ffab00; --accent-2: #ffd166; --accent-soft: rgba(255,171,0,.10);
    --bg: #0a0c0e; --side: #0f1214; --surface: #14181b; --raised: #1c2125;
    --line: #2a3036; --line-soft: rgba(255,255,255,.06);
    --ink: #e6e1d6; --ink-2: #9b9488; --ink-3: #5e574b;
    --ok: #7ee787; --warn: #ffab00; --err: #ff6b6b; --think: #c4a0e0; --tool: #ffab00;
    --code-bg: #111417; --code-alt: #181c20;
    --font: 'JetBrains Mono','PingFang SC','Microsoft YaHei',monospace;
    --display: 'Major Mono Display','JetBrains Mono',monospace;
    --term: 'VT323','JetBrains Mono',monospace;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
    --r: 8px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { color: var(--ink); font-family: var(--font); font-size: 14px;
    display: flex; overflow: hidden;
    background: var(--bg); }

  /* ── left persistent sidebar ── */
  .side { width: 248px; flex: none; background: var(--side); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; padding: 0; }
  .side-top { padding: 12px 10px 8px; display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; border-radius: 8px; position: relative;
    background: linear-gradient(140deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: #04211d;
    box-shadow: 0 3px 10px rgba(255,171,0,.2); }
  .logo svg { width: 16px; height: 16px; }
  .logo-txt { font-family: var(--display); font-weight: 600; font-size: 14px; letter-spacing: -.02em; }
  .logo-txt b { color: var(--accent); font-weight: 700; }
  .new-btn { margin: 0 8px 6px; padding: 7px 10px; border-radius: var(--r); border: 1px dashed var(--line);
    background: transparent; color: var(--ink-2); cursor: pointer; font-family: var(--font); font-size: 12.5px;
    display: flex; align-items: center; gap: 6px; justify-content: center; }
  .new-btn:hover { border-color: var(--accent); color: var(--accent); border-style: solid; }
  .side-label { padding: 8px 12px 6px; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); }
  /* hide the "会话" label when there are no sessions yet. */
  .side.no-sessions .side-label { display: none; }
  .sess-list { flex: 1; min-height: 0; overflow-y: auto; padding: 0 8px 8px; }
  .sess-list > .empty { display: grid; min-height: 100%; place-items: center; padding: 24px 14px; line-height: 1.7; }
  .sess { padding: 9px 10px; border: 1px solid transparent; border-radius: var(--r); cursor: pointer; margin-bottom: 4px; }
  .sess:hover { background: var(--surface); }
  .sess.active { background: var(--accent-soft); border-color: rgba(255,171,0,.18); box-shadow: inset 2px 0 0 var(--accent); }
  .sess .st { font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sess .sm { font-size: 10px; color: var(--ink-3); display: flex; justify-content: space-between; margin-top: 1px; }
  .sess .del:hover { color: var(--err); }
  .side-foot { min-height: 44px; padding: 7px 10px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 7px; }
  .side-foot .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-3); }
  .side-foot .dot.on { background: var(--ok); } .side-foot .dot.busy { background: var(--tool); animation: bl 1s infinite; }
  @keyframes bl { 50% { opacity: .3; } }
  .side-foot .fx { flex: 1; font-size: 11px; color: var(--ink-3); }
  .gear { width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent; color: var(--ink-2);
    cursor: pointer; display: grid; place-items: center; font-size: 15px; }
  .gear:hover { background: var(--surface); color: var(--accent); }

  /* ── main column ── */
  .main { position: relative; flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .top { height: 54px; flex: none; border-bottom: 1px solid var(--line); display: flex; align-items: center;
    padding: 0 22px; gap: 12px; }
  .top .title { font-family: var(--display); font-size: 14px; font-weight: 500; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }
  .top .sub { font-size: 12px; color: var(--ink-3); }
  .top .grow { flex: 1; }
  .top .abtn { padding: 6px 13px; border-radius: 8px; border: 1px solid var(--line); background: transparent;
    color: var(--ink-2); cursor: pointer; font-family: var(--font); font-size: 12.5px; display: inline-flex; align-items: center; gap: 6px; }
  .top .abtn:hover { border-color: var(--accent); color: var(--accent); }
  #scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 24px; }
  .jump-latest { position: absolute; z-index: 8; left: 50%; bottom: 88px; transform: translateX(-50%); height: 32px; padding: 0 12px; border: 1px solid var(--line); border-radius: 999px; background: var(--raised); color: var(--ink-2); box-shadow: 0 8px 24px rgba(0,0,0,.28); cursor: pointer; font: 11px var(--font); }
  .jump-latest:hover { border-color: var(--accent); color: var(--accent); }
  .jump-latest[hidden], body.empty .jump-latest { display: none; }
  .col { max-width: 760px; margin: 0 auto; min-width: 0; }

  /* ── empty state: original "reverse terminal" aesthetic ── */
  body.empty #scroll { display: flex; align-items: stretch; padding: 24px; }
  body.empty .composer-wrap { display: none; }         /* composer moves into the hero */
  body.empty .col { width: min(100%, 680px); margin: auto; }
  .term { width: 100%; border: 1px solid var(--line); border-radius: 8px;
    background: var(--code-bg); box-shadow: 0 20px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.03);
    overflow: hidden; }
  .term-bar { display: flex; align-items: center; gap: 7px; padding: 8px 12px; background: var(--raised);
    border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 11.5px; color: var(--ink-3); }
  .term-bar .tdot { width: 10px; height: 10px; border-radius: 50%; background: var(--line); }
  .term-bar .tname { margin-left: 4px; }
  .term-bar .tname b { color: var(--accent); font-weight: 600; }
  .term-body { padding: 22px 24px 24px; font-family: var(--mono); text-align: center; }
  .term-prompt { color: var(--ink-3); font-size: 13px; margin-bottom: 6px; }
  .term-prompt .ps { color: var(--accent); } .term-prompt .path { color: var(--ink-2); }
  .term-cursor { display: inline-block; width: 9px; height: 1.05em; background: var(--accent);
    vertical-align: text-bottom; margin-left: 4px; animation: blink 1.1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .term-h1 { font-family: var(--display); font-size: 32px; line-height: 1.25; letter-spacing: -.01em;
    margin: 4px 0 2px; color: var(--ink); }
  .term-h1 .amber { color: var(--accent); text-shadow: 0 0 16px rgba(255,171,0,.35); }
  .term-sub { font-family: 'PingFang SC','Microsoft YaHei',sans-serif !important;
    color: var(--ink-2); font-size: 13.5px; line-height: 1.65; margin: 8px auto 18px; max-width: 40em; text-align: center; }
  .term-rule { color: var(--ink-3); opacity: .5; letter-spacing: 2px; font-size: 11px; margin: 0 0 14px;
    overflow: hidden; white-space: nowrap; }
  .term-composer { margin: 8px 0 16px; }
  .config-notice { margin: 0 auto 16px; max-width: 620px; display: flex; align-items: center; gap: 12px; padding: 11px 12px; border: 1px solid rgba(255,171,0,.32); border-radius: 10px; background: rgba(255,171,0,.075); color: var(--ink-2); font-family: var(--font); text-align: left; }
  .config-notice .config-symbol { width: 28px; height: 28px; flex: none; display: grid; place-items: center; border-radius: 8px; background: rgba(255,171,0,.13); color: var(--accent); font: 14px var(--mono); }
  .config-notice .config-copy { min-width: 0; flex: 1; font-size: 12.5px; line-height: 1.55; }
  .config-notice button { flex: none; border: 1px solid rgba(255,171,0,.38); border-radius: 8px; background: transparent; color: var(--accent); padding: 6px 10px; cursor: pointer; font: 11px var(--font); }
  .config-notice button:hover { background: var(--accent-soft); }
  /* scenario examples — category tag + plain-language task */
  .cmd-list { display: flex; flex-direction: column; gap: 8px; text-align: left; }
  .cmd { display: flex; align-items: center; gap: 10px; padding: 10px 13px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 5px; cursor: pointer; transition: border-color .15s, background .15s; text-align: left; }
  .cmd:hover { border-color: var(--accent); background: var(--accent-soft); }
  .cmd .tag { flex: none; font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--accent-soft); padding: 2px 7px; border-radius: 3px; }
  .cmd .desc { color: var(--ink-2); font-size: 13px; line-height: 1.45; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
  .cmd .arr { margin-left: auto; color: var(--ink-3); flex: none; font-size: 12px; }

  /* ── conversation ── */
  .turn { margin: 16px 0; }
  .msg-user { display: flex; justify-content: flex-end; align-items: flex-end; flex-direction: column; }
  .msg-user .bubble { max-width: 86%; padding: 10px 15px; font-size: 14.5px; line-height: 1.65;
    background: var(--accent-soft); border: 1px solid rgba(255,171,0,.2); border-radius: 14px 14px 4px 14px;
    min-width: 0; overflow-wrap: anywhere; }
  .turn-meta { margin-top: 5px; color: var(--ink-3); font: 10.5px/1.4 var(--mono); letter-spacing: .01em; }
  .agent-body > .turn-meta { margin-top: 0; }
  .turn-duration { color: var(--accent); opacity: .82; }
  .agent-line { display: flex; gap: 12px; }
  .agent-step-title { font-family: var(--mono); font-size: 12.5px; color: var(--accent);
    letter-spacing: .02em; padding: 2px 0 4px; }
  .rail { flex: none; width: 14px; height: 14px; border-radius: 4px; margin-top: 4px; background: var(--accent);
    box-shadow: 0 0 0 3px var(--bg); }
  .rail.active { animation: pz 1.5s infinite; } .rail.done { background: var(--ok); animation: none; } .rail.error { background: var(--err); animation: none; }
  @keyframes pz { 0%,100% { box-shadow: 0 0 0 3px var(--bg), 0 0 0 4px rgba(255,171,0,.5); } 50% { box-shadow: 0 0 0 3px var(--bg), 0 0 0 8px rgba(255,171,0,.12); } }
  .pending-turn .rail.active { animation: pending-core 1.45s cubic-bezier(.4,0,.2,1) infinite; }
  @keyframes pending-core {
    0%,100% { border-radius: 4px; transform: rotate(0) scale(1); box-shadow: 0 0 0 3px var(--bg), 0 0 0 4px rgba(255,171,0,.38); }
    50% { border-radius: 50%; transform: rotate(45deg) scale(.78); box-shadow: 0 0 0 3px var(--bg), 0 0 0 9px rgba(255,171,0,.08); }
  }
  .agent-connecting { display: flex; align-items: center; gap: 6px; min-height: 26px; color: var(--ink-3); font-size: 12.5px; }
  .agent-connecting .dot-wave { width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
    transform-origin: center; animation: wait-wave 1.18s cubic-bezier(.45,0,.55,1) infinite; }
  .agent-connecting .dot-wave:nth-child(1) { animation-delay: -.24s; }
  .agent-connecting .dot-wave:nth-child(2) { animation-delay: -.12s; }
  .agent-connecting .dot-wave:nth-child(3) { animation-delay: 0s; }
  .agent-connecting .wait-label { margin-left: 5px; background: linear-gradient(90deg, var(--ink-3) 20%, var(--accent) 50%, var(--ink-3) 80%);
    background-size: 220% 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    animation: wait-label-flow 2.2s linear infinite; }
  @keyframes wait-wave {
    0%,70%,100% { opacity: .28; transform: translateY(0) scale(.72); box-shadow: 0 0 0 0 rgba(255,171,0,0); }
    35% { opacity: 1; transform: translateY(-4px) scale(1.16); box-shadow: 0 3px 8px rgba(255,171,0,.28); }
  }
  @keyframes wait-label-flow { from { background-position: 110% 0; } to { background-position: -110% 0; } }
  .agent-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .agent-text { min-width: 0; font-size: 14.5px; line-height: 1.7; overflow-wrap: anywhere; }
  .interaction-context { margin-top: 5px; color: var(--ink-3); font-size: 12.5px; }
  .interaction-options { display: grid; gap: 7px; margin-top: 12px; max-width: 620px; }
  .interaction-option { width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; background: rgba(255,255,255,.025); color: var(--ink); cursor: pointer; text-align: left; font: inherit; }
  .interaction-option:hover { border-color: rgba(255,171,0,.48); background: var(--accent-soft); }
  .interaction-option-label { display: block; font-weight: 650; }
  .interaction-option-description { display: block; margin-top: 2px; color: var(--ink-3); font-size: 12px; }
  .agent-text a, .artifact-preview-markdown a { color: var(--accent); text-decoration-color: rgba(255,171,0,.4); text-underline-offset: 3px; cursor: pointer; }
  .agent-text a:hover, .artifact-preview-markdown a:hover { color: var(--accent-2); text-decoration-color: currentColor; }
  .agent-text a.external-link, .artifact-preview-markdown a.external-link { display: inline-block; max-width: min(100%, 36rem); padding: 0 6px; overflow: hidden;
    border: 1px solid rgba(255,171,0,.2); border-radius: 5px; background: rgba(255,171,0,.055); vertical-align: -.28em;
    color: var(--accent); font-family: var(--mono); font-size: .86em; line-height: 1.55; text-decoration: none; text-overflow: ellipsis; white-space: nowrap; }
  .agent-text a.external-link:hover, .artifact-preview-markdown a.external-link:hover { border-color: rgba(255,171,0,.5); background: rgba(255,171,0,.1); }
  .final { border-left: 3px solid var(--ok); padding-left: 14px; }
  .inline-artifacts { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line-soft); }
  .inline-artifacts-head { margin-bottom: 7px; color: var(--ink-3); font: 10px var(--mono); letter-spacing: .1em; text-transform: uppercase; }
  .inline-artifacts-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(210px,1fr)); gap: 8px; }
  .artifact-card { min-width: 0; display: grid; grid-template-columns: 34px minmax(0,1fr) auto; gap: 10px; align-items: center;
    padding: 10px 11px; border: 1px solid var(--line); border-radius: 10px; background: linear-gradient(135deg,var(--surface),rgba(255,171,0,.025));
    color: var(--ink); text-align: left; cursor: pointer; transition: transform .16s,border-color .16s,background .16s; }
  .artifact-card:hover { transform: translateY(-1px); border-color: rgba(255,171,0,.42); background: var(--raised); }
  .artifact-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .artifact-card-icon { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 9px; background: var(--accent-soft); color: var(--accent); font: 14px var(--mono); }
  .artifact-card-copy { min-width: 0; }
  .artifact-card-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12.5px; font-weight: 600; }
  .artifact-card-meta { margin-top: 3px; color: var(--ink-3); font: 10px var(--mono); }
  .artifact-card-open { color: var(--ink-3); font-size: 14px; }

  .think-head { display: inline-flex; align-items: center; gap: 7px; padding: 5px 11px; border-radius: 8px;
    background: var(--surface); color: var(--ink-3); font-size: 12.5px; cursor: pointer; user-select: none;
    font-family: var(--mono); }
  .think-head .ti { color: var(--accent); }
  .think-head .arrow { transition: transform .2s; font-size: 10px; margin-left: 2px; }
  .think.open .think-head .arrow { transform: rotate(180deg); }
  .think-head.shimmer .tl { background: linear-gradient(90deg, var(--ink-3), var(--accent), var(--ink-3));
    background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    animation: sh 2.2s linear infinite; } @keyframes sh { to { background-position: -200% center; } }
  .think-body { max-height: 0; overflow: hidden; transition: max-height .3s, opacity .3s; opacity: 0;
    font-size: 12.5px; line-height: 1.75; color: var(--ink-3); padding-left: 10px; }
  .think.open .think-body { max-height: 1400px; opacity: 1; margin-top: 6px; }

  .tool-head { display: inline-flex; align-items: center; gap: 8px; max-width: 100%; padding: 6px 11px; border-radius: 8px;
    font-family: var(--mono); font-size: 12px; color: var(--tool); cursor: pointer; user-select: none; background: var(--surface); }
  .tool.open .tool-head { background: var(--raised); }
  .tool-head .tn { color: var(--accent); flex: none; }
  .tool-head .targ { color: var(--ink-3); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pip { width: 9px; height: 9px; border-radius: 3px; flex: none; }
  .pip.pending { border: 2px solid var(--accent); animation: bl 1.2s infinite; }
  .pip.done { background: var(--ok); } .pip.error { background: var(--err); }
  .tool-head .arrow { margin-left: auto; transition: transform .2s; font-size: 10px; flex: none; }
  .tool.open .tool-head .arrow { transform: rotate(90deg); }
  .tool-body { max-height: 0; overflow: hidden; transition: max-height .3s cubic-bezier(.2,0,0,1); }
  .tool.open .tool-body { max-height: 360px; overflow: auto; margin-top: 6px; }
  .tool-body pre { margin: 0; padding: 10px 12px; background: var(--code-bg); border: 1px solid var(--line-soft);
    border-radius: 8px; font-family: var(--mono); font-size: 11.5px; white-space: pre-wrap; word-break: break-word; color: var(--ink-2); }

  .md { font-size: 14.5px; line-height: 1.7; }
  .md h1,.md h2,.md h3 { font-family: var(--display); font-weight: 600; margin: 1em 0 .5em; } .md h1 { font-size: 20px; } .md h2 { font-size: 17px; } .md h3 { font-size: 15px; }
  .md p { margin: 0 0 .85em; } .md a { color: var(--accent); }
  .md :not(pre) > code { padding: 2px 6px; border-radius: 6px; background: var(--surface); border: 1px solid var(--line-soft);
    font-family: var(--mono); font-size: 90%; }
  .md pre { border-radius: 12px; padding: 14px 16px; overflow: auto; border: 1px solid var(--line);
    background: linear-gradient(180deg, var(--code-bg), var(--code-alt)); }
  .md pre code { font-family: var(--mono); font-size: 13px; background: none; padding: 0; border: none; }
  .md table { border-collapse: collapse; width: 100%; font-size: 13px; margin: .5em 0; }
  .md th, .md td { border: 1px solid var(--line); padding: 6px 10px; } .md th { background: var(--surface); }

  /* ── composer ── */
  .composer-wrap { flex: none; padding: 12px 24px 18px; }
  .composer { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 11px 12px 11px 15px;
    transition: border-color .2s, box-shadow .2s; }
  .composer:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .composer textarea { flex: 1; background: transparent; border: none; outline: none; resize: none; color: var(--ink);
    font-family: var(--font); font-size: 14.5px; line-height: 1.65; max-height: 180px; padding: 3px 0; }
  .send { width: 38px; height: 38px; border-radius: 10px; border: none; background: var(--accent); color: #04211d;
    cursor: pointer; display: grid; place-items: center; font-size: 15px; font-weight: 700; transition: transform .15s, background .15s; }
  .send:hover { transform: translateY(-1px); } .send:disabled { opacity: .4; cursor: default; } .send.stop { background: var(--err); color: #fff; }
  .attach-btn { width: 34px; height: 38px; flex: none; border: 1px solid transparent; border-radius: 9px; background: transparent; color: var(--ink-3); cursor: pointer; font-size: 18px; transition: color .15s, border-color .15s, background .15s; }
  .attach-btn:hover { color: var(--accent); border-color: var(--line); background: var(--raised); }
  .attach-btn:disabled { opacity: .35; cursor: default; }
  .attachment-tray { max-width: 760px; margin: 8px auto 0; display: flex; flex-wrap: wrap; gap: 7px; }
  .attachment-tray:empty { display: none; }
  .attachment-chip { max-width: 260px; height: 30px; display: inline-flex; align-items: center; gap: 7px; padding: 0 8px 0 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: var(--ink-2); font: 11px var(--font); }
  .attachment-chip .attachment-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attachment-chip button { border: 0; background: transparent; color: var(--ink-3); cursor: pointer; padding: 0 2px; }
  .attachment-chip button:hover { color: var(--err); }
  .bubble-attachments { margin-top: 7px; display: flex; flex-wrap: wrap; gap: 5px; }
  .bubble-attachment { padding: 3px 7px; border-radius: 6px; background: rgba(255,255,255,.08); font-size: 11px; opacity: .86; }

<body>

<script>
const $ = (id) => document.getElementById(id);
const stream = $('stream'), scroll = $('scroll'), conn = $('conn'), connTxt = $('connTxt'), jumpLatest = $('jumpLatest');
const taskEl = $('task'), sendBtn = $('send'), attachBtn = $('attachBtn'), attachInput = $('attachInput'), attachmentTray = $('attachmentTray');
let sock, sessionId = null, running = false, configRequired = false, reconnectTimer = null, curRail = null, curThink = null, curText = null, lastText = null, visibleReplyStarted = false, pendingAgent = null, activeStepId = '', pendingAssist = '', pendingInteractionOption = null;
const ignoredLiveSessions = new Set();
let sessionLoadVersion = 0;
let followLatest = true, programmaticScroll = false;
let artifactRows = [], selectedArtifact = null, pendingAttachments = [];
let activeRunStartedAt = Number.NaN;

marked.setOptions({ breaks: true, highlight: (code, lang) => {
  try { return lang && hljs.getLanguage(lang) ? hljs.highlight(code, {language:lang}).value : hljs.highlightAuto(code).value; }
  catch (_) { return code; }
}});
const esc = (s) => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function updateJumpLatest() { jumpLatest.hidden = followLatest || document.body.classList.contains('empty'); }
function down(force = false) {
  if (!force && !followLatest) return;
  followLatest = true; updateJumpLatest(); programmaticScroll = true;
  requestAnimationFrame(() => {
    scroll.scrollTop = scroll.scrollHeight;
    requestAnimationFrame(() => { programmaticScroll = false; });
  });
}
scroll.addEventListener('scroll', () => {
  if (programmaticScroll) return;
  followLatest = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 72;
  updateJumpLatest();
});
jumpLatest.onclick = () => down(true);

// Scenario examples: concrete, plain-language reverse-engineering tasks.
// (category tag + one-line description — not a "task type picker")
const CMDS = [
  { tag: '签名', desc: '分析目标站点接口的 sign 签名是怎么算的，用 Python 独立复现',
    task: '分析目标站点接口的 sign 签名是怎么算的，用 Python 独立复现，脱离浏览器也能跑通。\n\n目标：https://\n接口：' },
  { tag: '加密参数', desc: '逆向接口里某个加密参数的生成逻辑，下断点读密钥和算法',
    task: '目标接口有个加密参数（如 X-Sign / _token），定位它的生成函数，在函数处下断点读取密钥、盐值和算法，复现生成过程。\n\n目标：https://\n参数：' },
  { tag: '纯协议爬虫', desc: '写个 Python 纯协议爬虫走接口采集数据，不用浏览器',
    task: '写个 Python 纯协议爬虫采集目标站点的数据列表，直接走接口不依赖浏览器，需要先逆向其鉴权签名。\n\n目标：https://\n需要的数据：' },
  { tag: '浏览器爬虫', desc: '写个 Playwright 浏览器爬虫采集数据，处理登录态和动态渲染',
    task: '写个 Playwright 浏览器爬虫采集目标站点的数据，需要处理登录态和动态渲染的页面。\n\n目标：https://\n需要的数据：' },
];
function resetActiveRenderState() {
  curRail = null; curThink = null; curText = null; lastText = null;
  visibleReplyStarted = false;
  pendingAgent = null; activeStepId = ''; pendingAssist = ''; pendingInteractionOption = null;
}
function renderEmpty() {
  resetActiveRenderState();
  $('topTitle').textContent = '新会话';
  // Park the composer in the bottom wrap first so rewriting #stream never
  // destroys it (it may currently be inside a previous hero).
  $('composerWrap').appendChild($('composerBox'));
  document.body.classList.add('empty');
  stream.innerHTML = `<div class="term">
    <div class="term-bar">
      <span class="tdot"></span><span class="tdot"></span><span class="tdot"></span>
      <span class="tname">reverseloom@local: <b>~/</b> new-session</span>
    </div>
    <div class="term-body">
      <div class="term-prompt"><span class="ps">$</span> <span class="path">reverseloom</span> --start</div>
      <h1 class="term-h1">逆向 · 抓包 · 复现<span class="term-cursor"></span></h1>
      <p class="term-sub">贴上网址和字段，追踪签名/token 生成，交付独立请求。</p>
      <div class="term-rule">──────── protocol · breakpoint · sandbox ────────</div>
      <div class="term-composer" id="termComposer"></div>
      <div class="cmd-list" id="cmdList"></div>
    </div>
  </div>`;
  // Move the real composer into the terminal body so input sits with the content.
  $('termComposer').appendChild($('composerBox'));
  const cl = $('cmdList');
  CMDS.forEach(c => { const b = document.createElement('button'); b.className = 'cmd';
    b.innerHTML = `<span class="tag">${c.tag}</span><span class="desc">${esc(c.desc)}</span><span class="arr">↵</span>`;
    b.onclick = () => { taskEl.value = c.task; taskEl.focus(); autosize(); };
    cl.appendChild(b);
  });
  taskEl.focus();
}
function leaveEmpty() {
  // Return the composer to the bottom bar for the conversation view.
  if (document.body.classList.contains('empty')) {
    document.body.classList.remove('empty');
    $('composerWrap').appendChild($('composerBox'));
  }
}

// Create (or reuse) a collapsible think block in body b, seeded with text.
function startThink(b, seed) {
  const t = document.createElement('div'); t.className='think open';
  t.innerHTML = `<div class="think-head shimmer"><span class="ti">▌</span><span class="tl">正在思考…</span><span class="arrow">▾</span></div><div class="think-body" data-raw=""></div>`;
  t.querySelector('.think-head').onclick = () => t.classList.toggle('open');
  b.appendChild(t); curThink = t;
  if (seed) { const tb = t.querySelector('.think-body'); tb.dataset.raw = seed; tb.textContent = seed; }
  return t;
}

function agentLine(stepId = '', isPending = false) {
  const wrap = document.createElement('div'); wrap.className = 'turn' + (isPending ? ' pending-turn' : '');
  const line = document.createElement('div'); line.className = 'agent-line'; line.dataset.stepId = stepId;
  const rail = document.createElement('div'); rail.className = 'rail active'; rail.dataset.stepId = stepId;
  const body = document.createElement('div'); body.className = 'agent-body';
  line.appendChild(rail); line.appendChild(body); wrap.appendChild(line); stream.appendChild(wrap);
  curRail = rail; activeStepId = stepId; return body;
}
function findStepRail(stepId) {
  if (!stepId) return null;
  return Array.from(stream.querySelectorAll('.rail')).find(el => el.dataset.stepId === stepId) || null;
}
function findStepTool(stepId, toolName) {
  return Array.from(stream.querySelectorAll('.tool')).find(el =>
    !el.classList.contains('done') &&
    (!stepId || el.dataset.stepId === stepId) &&
    el.querySelector('.tn')?.textContent === toolName

  stream.innerHTML=''; $('topTitle').textContent = title || id;
  try {
    const [payload, artifacts] = await Promise.all([
      fetch(`/api/sessions/${id}/history`).then(response => response.json()),
      fetch(`/api/sessions/${id}/artifacts`).then(response => response.json()),
    ]);
    if (loadVersion !== sessionLoadVersion || sessionId !== id) return;
    artifactRows = Array.isArray(artifacts) ? artifacts : [];
    renderArtifactList(artifactRows);
    const messages = (Array.isArray(payload) ? payload : payload.messages || [])
      .slice().sort((left, right) => (left.seq || 0) - (right.seq || 0));
    const steps = normalizeHistoricalSteps(Array.isArray(payload) ? [] : payload.past_steps);
    const assistantMessages = messages.filter(message => message.role !== 'user');
    const artifactBuckets = new Map();
    artifactRows.forEach(artifact => {
      const artifactAt = historyTime(artifact.modified_at);
      let target = assistantMessages.find(message => {
        const replyAt = historyTime(message.created_at);
        return Number.isFinite(artifactAt) && Number.isFinite(replyAt) && replyAt >= artifactAt;
      }) || assistantMessages[assistantMessages.length - 1];
      if (!target) return;
      const targetId = target.id || `assistant-${target.seq || 0}`;
      const bucket = artifactBuckets.get(targetId) || []; bucket.push(artifact); artifactBuckets.set(targetId, bucket);
    });
    const timeline = (!Array.isArray(payload) && Array.isArray(payload.timeline) && payload.timeline.length)
      ? payload.timeline
      : [
          ...messages.map(message => ({...message, type: message.role})),
          ...steps.map(step => ({
            type: 'step', id: step.step_id, created_at: step.created_at || step.timestamp, step,
          })),
        ].sort((left, right) => (historyTime(left.created_at) || 0) - (historyTime(right.created_at) || 0));
    let lastAgentBody = null;
    let turnStartedAt = Number.NaN;
    timeline.forEach(event => {
      if (event.type === 'message' && event.role === 'user') {
        turnStartedAt = historyTime(event.created_at);
        renderHistoricalUser(event);
      } else if (event.type === 'step') {
        renderHistoricalStep(event.step || event);
      } else if (event.type === 'message' && event.role === 'assistant') {
        lastAgentBody = renderHistoricalReply(event, turnStartedAt);
        turnStartedAt = Number.NaN;
        const eventId = event.id || `assistant-${event.seq || 0}`;
        renderArtifactRail(lastAgentBody, artifactBuckets.get(eventId) || []);
      }
    });
    if (!assistantMessages.length && artifactRows.length) {
      lastAgentBody = stream.querySelector('.turn:last-child .agent-body') || historicalAgentBody('done');
      renderArtifactRail(lastAgentBody, artifactRows);
    }
  } catch (_) {}
  loadSessions(); down(true);
}
async function delSession(id) {
  const deletedCurrent = id === sessionId;
  if (deletedCurrent && !confirmRunningSessionSwitch(null)) return;
  await fetch(`/api/sessions/${id}`, {method:'DELETE'});
  if (deletedCurrent) { sessionId=null; renderEmpty(); }
  loadSessions(deletedCurrent);
}
function newSession() {
  if (!confirmRunningSessionSwitch(null)) return;
  sessionLoadVersion++; sessionId=null; renderEmpty(); loadSessions();
}

function fmtSize(n){ return n<1024?n+' B':n<1048576?(n/1024).toFixed(1)+' KB':(n/1048576).toFixed(1)+' MB'; }
function artifactTypeLabel(artifact) {
  return ({markdown:'Markdown',text:'文本',image:'图片',pdf:'PDF',binary:'文件'})[artifact.content_type] || '文件';
}
function artifactIcon(artifact) {
  return ({markdown:'MD',text:'TXT',image:'IMG',pdf:'PDF',binary:'FILE'})[artifact.content_type] || 'FILE';
}
function hasArtifactCard(path) {
  return Array.from(stream.querySelectorAll('[data-artifact-path]')).some(node => node.dataset.artifactPath === path);
}
function renderArtifactRail(body, rows) {
  if (!body || !Array.isArray(rows) || !rows.length) return;
  const fresh = rows.filter(artifact => artifact?.path && !hasArtifactCard(artifact.path));
  if (!fresh.length) return;
  const rail=document.createElement('div'); rail.className='inline-artifacts';
  const head=document.createElement('div'); head.className='inline-artifacts-head'; head.textContent=`本轮产物 · ${fresh.length}`;
  const grid=document.createElement('div'); grid.className='inline-artifacts-grid';
  fresh.forEach(artifact => {
    const button=document.createElement('button'); button.type='button'; button.className='artifact-card';
    button.dataset.artifactPath=artifact.path; button.setAttribute('aria-label', `预览产物 ${artifact.name || artifact.path}`);
    button.innerHTML=`<span class="artifact-card-icon">${artifactIcon(artifact)}</span><span class="artifact-card-copy"><span class="artifact-card-name">${esc(artifact.name || artifact.path)}</span><span class="artifact-card-meta">${artifactTypeLabel(artifact)} · ${fmtSize(artifact.size || 0)}</span></span><span class="artifact-card-open">↗</span>`;
    button.onclick=()=>openArtifactPreview(artifact.path); grid.appendChild(button);
  });
  rail.appendChild(head); rail.appendChild(grid); body.appendChild(rail);
}
async function fetchArtifactRows() {
  if (!sessionId) return [];
  const response=await fetch(`/api/sessions/${sessionId}/artifacts`);
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const rows=await response.json(); artifactRows=Array.isArray(rows) ? rows : []; return artifactRows;
}
async function loadInlineArtifacts(body) {
  try { const rows=await fetchArtifactRows(); renderArtifactList(rows); renderArtifactRail(body, rows); } catch (_) {}
}
function renderArtifactList(rows) {
  const el=$('artList'); el.innerHTML='';
  if (!sessionId) { el.innerHTML='<div class="empty">先运行一个任务</div>'; return; }
  if (!rows.length) { el.innerHTML='<div class="empty">暂无产物</div>'; return; }
  rows.slice().reverse().forEach(artifact => {
    const item=document.createElement('button'); item.type='button'; item.className='art'; item.dataset.artifactPath=artifact.path;
    item.innerHTML=`<div class="ic">${artifactIcon(artifact)}</div><div style="min-width:0"><div class="ap">${esc(artifact.name || artifact.path)}</div><div class="as">${artifactTypeLabel(artifact)} · ${fmtSize(artifact.size || 0)}</div></div>`;
    item.onclick=()=>openArtifactPreview(artifact.path); el.appendChild(item);
  });
}
function showArtifactList() {
  selectedArtifact=null; $('artTitle').textContent='产物'; $('artBack').hidden=true; $('artCopy').hidden=true; $('artDownload').hidden=true;
  $('artPreview').classList.remove('open'); $('artList').hidden=false; openModal('artModal'); void loadArtifacts();
}
async function loadArtifacts() {
  try { renderArtifactList(await fetchArtifactRows()); } catch (_) { $('artList').innerHTML='<div class="empty">产物加载失败</div>'; }
}
function artifactEndpoint(kind, path) {
  return `/api/sessions/${encodeURIComponent(sessionId)}/artifact/${kind}?path=${encodeURIComponent(path)}`;
}
async function openArtifactPreview(path) {
  if (!sessionId || !path) return;
  selectedArtifact=artifactRows.find(item => item.path === path) || {path, name:path, content_type:'text', size:0};
  $('artTitle').textContent=selectedArtifact.name || selectedArtifact.path; $('artBack').hidden=false; $('artCopy').hidden=true; $('artDownload').hidden=false;
  $('artList').hidden=true; const previewEl=$('artPreview'); previewEl.classList.add('open'); previewEl.innerHTML='<div class="artifact-preview-loading">正在加载产物预览…</div>'; openModal('artModal');
  try {
    const response=await fetch(artifactEndpoint('preview', path));
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const preview=await response.json(); selectedArtifact={...selectedArtifact,...preview};
    const rawUrl=artifactEndpoint('raw', path);
    if (preview.content_type === 'image') previewEl.innerHTML=`<img class="artifact-preview-media" src="${rawUrl}" alt="${esc(preview.name || path)}">`;
    else if (preview.content_type === 'pdf') previewEl.innerHTML=`<iframe class="artifact-preview-media" src="${rawUrl}" title="${esc(preview.name || path)}"></iframe>`;
    else if (!preview.previewable) previewEl.innerHTML='<div class="artifact-preview-empty">当前文件不支持在线预览，可使用右上角下载。</div>';
    else if (preview.content_type === 'markdown') { previewEl.innerHTML='<div class="artifact-preview-markdown"></div>'; renderMarkdown(previewEl.querySelector('.artifact-preview-markdown'), preview.artifact_content || ''); $('artCopy').hidden=false; }
    else { const pre=document.createElement('pre'); pre.className='artifact-preview-pre'; pre.textContent=preview.artifact_content || ''; previewEl.innerHTML=''; previewEl.appendChild(pre); $('artCopy').hidden=false; }
    if (preview.truncated) previewEl.insertAdjacentHTML('beforeend','<div class="artifact-preview-note">文件较大，当前仅展示前 512 KB；完整内容请下载。</div>');
  } catch (error) { previewEl.innerHTML=`<div class="artifact-preview-empty">预览失败：${esc(String(error.message || error))}</div>`; }
}
async function copySelectedArtifact() {
  const content=selectedArtifact?.artifact_content || ''; if (!content) return;
  try { await navigator.clipboard.writeText(content); $('artCopy').textContent='已复制'; setTimeout(()=>{$('artCopy').textContent='复制';},1200); } catch (_) {}
}
async function openExternalUrl(url) {
  const value=String(url || '').trim(); if (!value) return false;
  try {
    const target=new URL(value, location.href);
    if (!['http:','https:','mailto:'].includes(target.protocol)) return false;
    if (window.pywebview?.api?.open_external) return Boolean(await window.pywebview.api.open_external(target.href));
    const popup=window.open(target.href,'_blank','noopener,noreferrer'); return Boolean(popup);
  } catch (_) { return false; }
}
function artifactPathFromHref(href) {
  const raw=String(href || '').trim();
  if (raw.startsWith('artifact:')) { try { return decodeURIComponent(raw.slice(9)); } catch (_) { return raw.slice(9); } }
  try { const url=new URL(raw, location.href); if (/\/artifact(?:\/(?:raw|preview))?$/.test(url.pathname)) return url.searchParams.get('path'); } catch (_) {}
  return '';
}
document.addEventListener('click', event => {
  const link=event.target.closest('.md a, .artifact-preview-markdown a'); if (!link) return;
  const href=link.getAttribute('href') || ''; if (!href || href.startsWith('#')) return;
  event.preventDefault();
  const artifactPath=artifactPathFromHref(href); if (artifactPath) { void openArtifactPreview(artifactPath); return; }
  let external=href; try { external=new URL(href, location.href).href; } catch (_) {}
  void openExternalUrl(external);
});

let settingsData = null, settingsDraft = {}, settingsOriginal = {}, activeSettingsGroup = 'model';
function settingFieldControl(field) {
  const value = settingsDraft[field.key];
  if (field.type === 'switch') {
    return `<label class="switch-control"><span>${value ? '\u5df2\u542f\u7528' : '\u5df2\u5173\u95ed'}</span><input data-key="${field.key}" type="checkbox" ${value ? 'checked' : ''}><span class="switch-track"><span class="switch-thumb"></span></span></label>`;
  }
  if (field.type === 'select') {
    const options = (field.options || []).map(option => `<option value="${esc(String(option.value))}" ${String(value) === String(option.value) ? 'selected' : ''}>${esc(String(option.label))}</option>`).join('');
    return `<select data-key="${field.key}">${options}</select>`;
  }
  const attrs = field.type === 'number'
    ? `type="number" ${field.min !== null ? `min="${field.min}"` : ''} ${field.max !== null ? `max="${field.max}"` : ''} ${field.step !== null ? `step="${field.step}"` : ''}`
    : `type="${field.secret ? 'password' : 'text'}"`;
  return `<input data-key="${field.key}" ${attrs} value="${esc(String(value ?? ''))}" placeholder="${esc(String(field.placeholder || ''))}" autocomplete="off">`;
}
function renderSettingsGroup(groupId = activeSettingsGroup) {
  const group = settingsData?.groups.find(item => item.id === groupId) || settingsData?.groups[0];
  if (!group) return;
  activeSettingsGroup = group.id;
  $('setTabs').innerHTML = '<div class="settings-nav-label">CONFIG SECTIONS</div>' + settingsData.groups.map((item, index) => `
    <button class="settings-tab ${item.id === group.id ? 'active' : ''}" data-group="${item.id}">
      <span class="tab-index">${String(index + 1).padStart(2, '0')}</span>
      <span><strong>${esc(item.label)}</strong><small>${esc(item.eyebrow)}</small></span>
    </button>`).join('');
  $('setTabs').querySelectorAll('.settings-tab').forEach(tab => tab.onclick = () => renderSettingsGroup(tab.dataset.group));
  $('setEyebrow').textContent = group.eyebrow;
  $('setGroupTitle').textContent = group.label;
  $('setGroupDesc').textContent = group.description;
  $('setFields').innerHTML = group.fields.map(field => {
    const applyClass = field.restart_required ? 'restart' : (field.reconnect_required ? 'reconnect' : '');
    const applyText = field.restart_required ? '\u91cd\u542f\u540e' : (field.reconnect_required ? '\u91cd\u8fde\u540e' : '\u5373\u65f6');
    return `<section class="setting-card">
      <div class="setting-label-row"><label>${esc(field.label)}</label><span class="apply-badge ${applyClass}">${applyText}</span></div>
      <div class="setting-desc">${esc(field.description)}</div>
      <div class="setting-control">${settingFieldControl(field)}</div>
      <div class="setting-key">${esc(field.key)}</div>
    </section>`;
  }).join('');
  $('setFields').querySelectorAll('input,select').forEach(control => {
    const sync = () => {
      settingsDraft[control.dataset.key] = control.type === 'checkbox' ? control.checked : control.value;
      if (control.type === 'checkbox') control.closest('.switch-control').firstElementChild.textContent = control.checked ? '\u5df2\u542f\u7528' : '\u5df2\u5173\u95ed';
    };
    control.addEventListener('input', sync);
    control.addEventListener('change', sync);
  });
}
async function openSettings() {
  const status = $('setStatus'); status.className = 'settings-status'; status.textContent = '\u6b63\u5728\u8bfb\u53d6\u672c\u5730\u914d\u7f6e\u2026';
  openModal('setModal');
  try {
    settingsData = await (await fetch('/api/settings')).json();
    settingsDraft = {}; settingsOriginal = {};
    settingsData.groups.forEach(group => group.fields.forEach(field => { settingsDraft[field.key] = field.value; settingsOriginal[field.key] = field.value; }));
    renderSettingsGroup(settingsData.groups.some(group => group.id === activeSettingsGroup) ? activeSettingsGroup : settingsData.groups[0]?.id);
    status.textContent = '\u914d\u7f6e\u4fdd\u5b58\u5230 .env\uff1b\u6d4f\u89c8\u5668\u3001\u4e0a\u4e0b\u6587\u548c\u5b58\u50a8\u7c7b\u53c2\u6570\u9700\u91cd\u542f\u540e\u751f\u6548\u3002';
  } catch (error) {
    status.className = 'settings-status error'; status.textContent = '\u8bfb\u53d6\u914d\u7f6e\u5931\u8d25\uff1a' + error;
  }
}
function resetSettingsGroup() {
  const group = settingsData?.groups.find(item => item.id === activeSettingsGroup);
  if (!group) return;
  group.fields.forEach(field => { settingsDraft[field.key] = field.type === 'switch' ? !['', '0', 'false'].includes(String(field.default).toLowerCase()) : field.default; });
  renderSettingsGroup(group.id);
  $('setStatus').className = 'settings-status warn'; $('setStatus').textContent = '\u5df2\u6062\u590d\u672c\u9875\u9ed8\u8ba4\u503c\uff0c\u70b9\u51fb\u4fdd\u5b58\u540e\u751f\u6548\u3002';
}
async function saveSettings() {
  const button = $('setSave'), status = $('setStatus');
  button.disabled = true; button.textContent = '\u6b63\u5728\u4fdd\u5b58\u2026'; status.className = 'settings-status';
  const updates = {};
  Object.entries(settingsDraft).forEach(([key, value]) => {
    if (String(value) === String(settingsOriginal[key])) return;
    updates[key] = typeof value === 'boolean' ? (value ? '1' : '0') : value;
  });
  try {
    const response = await fetch('/api/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(updates)});
    const result = await response.json();
    if (!response.ok) throw new Error(result.error || '\u4fdd\u5b58\u5931\u8d25');
    Object.keys(updates).forEach(key => { settingsOriginal[key] = settingsDraft[key]; });
    if (result.reconnect_required) {
      configRequired = false; clearConfigNotice();
      if (!running && sock) sock.close(); else if (!sock) connect();
    }
    if (result.restart_required) {
      status.className = 'settings-status warn'; status.textContent = `\u5df2\u4fdd\u5b58 ${result.changed.length} \u9879\u914d\u7f6e\u3002\u8bf7\u91cd\u542f\u540e\u7aef\u4ee5\u5e94\u7528\u6d4f\u89c8\u5668\u3001\u4e0a\u4e0b\u6587\u6216\u5b58\u50a8\u53c2\u6570\u3002`;
    } else if (result.reconnect_required) {
      status.className = 'settings-status success'; status.textContent = running ? '\u5df2\u4fdd\u5b58\uff0c\u5f53\u524d\u4efb\u52a1\u5b8c\u6210\u540e\u91cd\u65b0\u8fde\u63a5\u6a21\u578b\u3002' : '\u5df2\u4fdd\u5b58\uff0c\u6a21\u578b\u8fde\u63a5\u6b63\u5728\u5237\u65b0\u3002';
    } else {
      status.className = 'settings-status success'; status.textContent = '\u914d\u7f6e\u5df2\u4fdd\u5b58\u3002';
    }
  } catch (error) {
    status.className = 'settings-status error'; status.textContent = String(error.message || error);
  } finally {
    button.disabled = false; button.textContent = '\u4fdd\u5b58\u914d\u7f6e';
  }
}

function openModal(id) { $('scrim').classList.add('open'); $(id).classList.add('open'); }
function closeModal() { $('scrim').classList.remove('open'); document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }
function autosize(){ taskEl.style.height='auto'; taskEl.style.height=Math.min(taskEl.scrollHeight,180)+'px'; }

attachBtn.onclick=()=>{ if (!running) attachInput.click(); };
attachInput.onchange=()=>void uploadFiles(Array.from(attachInput.files || []));
taskEl.addEventListener('input', autosize);
taskEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); run(); } });
sendBtn.onclick = () => { if (running && sock) sock.send(JSON.stringify({stop:true, session_id:sessionId})); else run(); };
$('btnNew').onclick = newSession;
$('btnGear').onclick = openSettings;
$('setSave').onclick = saveSettings;
$('setReset').onclick = resetSettingsGroup;
$('btnArt').onclick = showArtifactList;
$('artBack').onclick = showArtifactList;
$('artCopy').onclick = copySelectedArtifact;
$('artDownload').onclick = () => { if (selectedArtifact?.path) void openExternalUrl(new URL(`/api/sessions/${encodeURIComponent(sessionId)}/artifact?path=${encodeURIComponent(selectedArtifact.path)}`, location.href).href); };
$('setClose').onclick = $('artClose').onclick = $('scrim').onclick = closeModal;

renderEmpty(); connect(); loadSessions();
</script>
